<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>liminal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orb1: #5b21b6;
    --orb2: #0e7490;
    --orb3: #9d174d;
    --orb4: #b45309;
    --orb5: #4c1d95;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #04020e;
    cursor: none;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    mix-blend-mode: difference;
  }

  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99;
    transform: translate(-50%, -50%);
    transition: all 0.18s ease;
    mix-blend-mode: difference;
  }

  .scene {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .eyebrow {
    font-family: 'Tenor Sans', sans-serif;
    font-size: clamp(9px, 1.1vw, 11px);
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.28);
    text-transform: uppercase;
    margin-bottom: 22px;
    opacity: 0;
    animation: riseIn 2s ease 0.6s forwards;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(52px, 9vw, 110px);
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.06em;
    line-height: 1;
    text-align: center;
    opacity: 0;
    animation: riseIn 2.2s ease 0.2s forwards;
    text-shadow:
      0 0 80px rgba(139, 92, 246, 0.35),
      0 0 160px rgba(139, 92, 246, 0.15);
  }

  .title em {
    font-style: italic;
    color: rgba(255,255,255,0.55);
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(13px, 1.8vw, 18px);
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.18em;
    margin-top: 28px;
    opacity: 0;
    animation: riseIn 2s ease 1.1s forwards;
  }

  .line {
    width: 1px;
    height: 0;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.18), transparent);
    margin-top: 44px;
    animation: lineGrow 2s ease 1.6s forwards;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes lineGrow {
    from { height: 0; }
    to   { height: 60px; }
  }

  .corner {
    position: fixed;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
    opacity: 0;
    animation: riseIn 2s ease 2s forwards;
  }
  .corner.tl { top: 32px; left: 36px; }
  .corner.tr { top: 32px; right: 36px; }
  .corner.bl { bottom: 32px; left: 36px; }
  .corner.br { bottom: 32px; right: 36px; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<canvas id="c"></canvas>

<div class="scene">
  <div class="eyebrow">between worlds</div>
  <h1 class="title">lim<em>i</em>nal</h1>
  <p class="subtitle">a space that cannot be named</p>
  <div class="line"></div>
</div>

<div class="corner tl">00°N 00°W</div>
<div class="corner tr">2026</div>
<div class="corner bl">presence</div>
<div class="corner br">∞</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, mx = 0, my = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  document.getElementById('cursor').style.left = mx + 'px';
  document.getElementById('cursor').style.top = my + 'px';
  document.getElementById('cursorRing').style.left = mx + 'px';
  document.getElementById('cursorRing').style.top = my + 'px';
});

const orbs = [
  { x: 0.15, y: 0.2,  r: 0.42, color: '#5b21b6', speed: 0.00018, phase: 0 },
  { x: 0.8,  y: 0.3,  r: 0.38, color: '#0e7490', speed: 0.00013, phase: 1.8 },
  { x: 0.5,  y: 0.75, r: 0.35, color: '#9d174d', speed: 0.00021, phase: 3.2 },
  { x: 0.25, y: 0.65, r: 0.28, color: '#b45309', speed: 0.00016, phase: 5.1 },
  { x: 0.75, y: 0.7,  r: 0.3,  color: '#4c1d95', speed: 0.00019, phase: 2.4 },
  { x: 0.5,  y: 0.1,  r: 0.25, color: '#134e4a', speed: 0.00014, phase: 4.7 },
];

let t = 0;

function draw(ts) {
  t = ts;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#04020e';
  ctx.fillRect(0, 0, W, H);

  const mouseInfluence = 0.06;

  orbs.forEach(orb => {
    const drift = Math.sin(t * orb.speed + orb.phase);
    const drift2 = Math.cos(t * orb.speed * 0.7 + orb.phase + 1);

    const bx = orb.x * W + drift * W * 0.08 + (mx - W/2) * mouseInfluence * orb.r;
    const by = orb.y * H + drift2 * H * 0.07 + (my - H/2) * mouseInfluence * orb.r;
    const br = orb.r * Math.min(W, H) * (0.9 + Math.sin(t * orb.speed * 2 + orb.phase) * 0.1);

    const grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
    grad.addColorStop(0, orb.color + 'cc');
    grad.addColorStop(0.4, orb.color + '55');
    grad.addColorStop(1, 'transparent');

    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalCompositeOperation = 'source-over';

  const vignette = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.85);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(2,1,10,0.75)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
