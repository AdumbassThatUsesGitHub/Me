<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>liminal</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ede8; cursor: none; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .cursor { position: fixed; width: 5px; height: 5px; background: rgba(255,255,255,0.9); border-radius: 50%; pointer-events: none; z-index: 100; transform: translate(-50%,-50%); mix-blend-mode: difference; }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mx = 0, my = 0, tx = 0, ty = 0;
window.addEventListener('mousemove', e => {
  mx = (e.clientX / window.innerWidth - 0.5);
  my = (e.clientY / window.innerHeight - 0.5);
  document.getElementById('cursor').style.left = e.clientX + 'px';
  document.getElementById('cursor').style.top = e.clientY + 'px';
});

const DROPS = 340;
const drops = Array.from({length: DROPS}, () => ({
  x: Math.random(), y: Math.random(),
  len: 9 + Math.random() * 20,
  speed: 0.004 + Math.random() * 0.006,
  opacity: 0.07 + Math.random() * 0.2,
  width: 0.4 + Math.random() * 0.8
}));

// Pixelated ring configs
// Each ring: radius (fraction of min screen dim), pixel size, pixel count, direction, speed, opacity, color
const RINGS = [
  { r: 0.32, pxSize: 7,  count: 52, dir:  1, speed: 0.00018, opacity: 0.55, color: [140, 190, 255] },
  { r: 0.26, pxSize: 6,  count: 42, dir: -1, speed: 0.00025, opacity: 0.45, color: [160, 205, 255] },
  { r: 0.19, pxSize: 5,  count: 32, dir:  1, speed: 0.00032, opacity: 0.38, color: [120, 175, 245] },
  { r: 0.13, pxSize: 4,  count: 22, dir: -1, speed: 0.00042, opacity: 0.3,  color: [170, 215, 255] },
  { r: 0.07, pxSize: 3,  count: 14, dir:  1, speed: 0.00055, opacity: 0.25, color: [190, 225, 255] },
];

function drawPixelRing(cx, cy, ring, angle) {
  const [r, g, b] = ring.color;
  const radius = ring.r * Math.min(W, H) * 0.5;

  for (let i = 0; i < ring.count; i++) {
    const theta = (i / ring.count) * Math.PI * 2 + angle;
    const x = cx + Math.cos(theta) * radius;
    const y = cy + Math.sin(theta) * radius;

    // Fade pixels near bottom of ring to blend with horizon
    const fadeY = Math.max(0, Math.min(1, 1 - (y - (cy - radius * 0.3)) / (radius * 0.7)));
    const alpha = ring.opacity * fadeY;

    if (alpha <= 0.01) continue;

    // Pixel square
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    const ps = ring.pxSize;
    ctx.fillRect(x - ps/2, y - ps/2, ps, ps);

    // Slight glow behind pixel
    const glowSize = ps * 2.2;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
    grd.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.25})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(x - glowSize, y - glowSize, glowSize*2, glowSize*2);
  }
}

function drawClouds(t) {
  const clouds = [
    { x: 0.08, y: 0.06, w: 0.32, h: 0.055, d: 0.000038 },
    { x: 0.48, y: 0.04, w: 0.25, h: 0.045, d: 0.000028 },
    { x: 0.72, y: 0.1,  w: 0.34, h: 0.06,  d: 0.000022 },
    { x: 0.28, y: 0.18, w: 0.2,  h: 0.038, d: 0.000032 },
    { x: 0.88, y: 0.24, w: 0.22, h: 0.042, d: 0.000045 },
    { x: 0.55, y: 0.3,  w: 0.18, h: 0.032, d: 0.00003  },
  ];
  clouds.forEach(c => {
    const cx = (c.x + Math.sin(t * c.d) * 0.012) * W;
    const cy = c.y * H * 0.65;
    const cw = c.w * W;
    const ch = c.h * H;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw * 0.5);
    cg.addColorStop(0,   'rgba(255,250,240,0.28)');
    cg.addColorStop(0.5, 'rgba(248,240,225,0.1)');
    cg.addColorStop(1,   'rgba(240,230,210,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw*0.5, ch*0.5, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawScene(t) {
  tx += (mx - tx) * 0.04;
  ty += (my - ty) * 0.04;
  const px = tx * W * 0.045;
  const py = ty * H * 0.028;

  ctx.clearRect(0, 0, W, H);

  // ZEN SKY
  ctx.save();
  ctx.translate(px * 0.15, py * 0.08);
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.62);
  skyGrad.addColorStop(0,    '#f5f0e8');
  skyGrad.addColorStop(0.18, '#ede5d8');
  skyGrad.addColorStop(0.42, '#ddd0bc');
  skyGrad.addColorStop(0.65, '#c9b89e');
  skyGrad.addColorStop(0.85, '#b8a48c');
  skyGrad.addColorStop(1,    '#a8927a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(-W*0.1, 0, W*1.2, H*0.62);
  for (let i = 0; i < 5; i++) {
    const bandY = H*(0.08 + i*0.1), bandH = H*0.06;
    const bg = ctx.createLinearGradient(0, bandY, 0, bandY+bandH);
    bg.addColorStop(0,   'rgba(255,248,235,0)');
    bg.addColorStop(0.5, `rgba(255,245,225,${0.04+i*0.01})`);
    bg.addColorStop(1,   'rgba(255,248,235,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(-W*0.1, bandY, W*1.2, bandH);
  }
  ctx.restore();

  // CLOUDS
  ctx.save();
  ctx.translate(px * 0.2, py * 0.1);
  drawClouds(t);
  ctx.restore();

  // PIXELATED RINGS in sky
  ctx.save();
  ctx.translate(px * 0.1, py * 0.06);
  const ringCX = W * 0.5;
  const ringCY = H * 0.22; // upper sky
  RINGS.forEach(ring => {
    const angle = t * ring.speed * ring.dir;
    drawPixelRing(ringCX, ringCY, ring, angle);
  });
  ctx.restore();

  // DISTANT LIGHT
  const lightX = W*0.5 + px*0.28;
  const lightY = H*0.465 + py*0.14;
  const pulse = Math.sin(t*0.0003)*0.015;

  const bloom = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, W*0.55);
  bloom.addColorStop(0,   'rgba(255,245,210,0.22)');
  bloom.addColorStop(0.3, 'rgba(255,238,190,0.1)');
  bloom.addColorStop(0.7, 'rgba(240,220,170,0.04)');
  bloom.addColorStop(1,   'rgba(230,210,160,0)');
  ctx.fillStyle = bloom;
  ctx.fillRect(0, 0, W, H*0.65);

  const midGlow = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, W*(0.18+pulse));
  midGlow.addColorStop(0,   'rgba(255,252,230,0.6)');
  midGlow.addColorStop(0.3, 'rgba(255,245,200,0.25)');
  midGlow.addColorStop(0.7, 'rgba(255,235,170,0.08)');
  midGlow.addColorStop(1,   'rgba(255,230,150,0)');
  ctx.fillStyle = midGlow;
  ctx.fillRect(0, 0, W, H*0.65);

  const core = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, W*(0.045+pulse*0.5));
  core.addColorStop(0,   'rgba(255,255,248,1)');
  core.addColorStop(0.4, 'rgba(255,252,225,0.7)');
  core.addColorStop(1,   'rgba(255,245,200,0)');
  ctx.fillStyle = core;
  ctx.fillRect(0, 0, W, H*0.65);

  // HORIZON MIST
  ctx.save();
  ctx.translate(px*0.35, py*0.2);
  const mistGrad = ctx.createLinearGradient(0, H*0.42, 0, H*0.62);
  mistGrad.addColorStop(0,    'rgba(210,190,165,0)');
  mistGrad.addColorStop(0.45, 'rgba(195,175,148,0.5)');
  mistGrad.addColorStop(1,    'rgba(170,150,125,0.25)');
  ctx.fillStyle = mistGrad;
  ctx.fillRect(0, H*0.42, W, H*0.22);
  ctx.restore();

  // BLOOD LAKE
  ctx.save();
  ctx.translate(px*0.5, py*0.3);
  const lakeTop = H*0.572;
  const lakeGrad = ctx.createLinearGradient(0, lakeTop, 0, H);
  lakeGrad.addColorStop(0,    '#7a2535');
  lakeGrad.addColorStop(0.12, '#521828');
  lakeGrad.addColorStop(0.4,  '#300e17');
  lakeGrad.addColorStop(1,    '#150509');
  ctx.fillStyle = lakeGrad;
  ctx.fillRect(0, lakeTop, W, H-lakeTop);

  const reflY = lakeTop + (H-lakeTop)*0.1;
  const refl = ctx.createRadialGradient(lightX, reflY, 0, lightX, reflY, W*0.14);
  refl.addColorStop(0,   'rgba(200,100,80,0.4)');
  refl.addColorStop(0.5, 'rgba(140,50,50,0.15)');
  refl.addColorStop(1,   'rgba(80,20,20,0)');
  ctx.fillStyle = refl;
  ctx.fillRect(0, lakeTop, W, H-lakeTop);

  for (let i = 0; i < 9; i++) {
    const ry = lakeTop + (H-lakeTop)*(0.04+i*0.11);
    const wave = Math.sin(t*0.0009+i*0.9)*5;
    const rw = W*(0.1+i*0.07);
    ctx.beginPath();
    ctx.ellipse(lightX, ry+wave, rw, 2.5+i, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(190,70,70,${0.1-i*0.008})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  ctx.restore();

  // SHORELINE
  ctx.save();
  ctx.translate(px*0.5, py*0.3);
  ctx.beginPath();
  ctx.moveTo(0, H*0.572);
  for (let x = 0; x <= W; x += 3) {
    const wave = Math.sin(x*0.011+t*0.001)*2.5 + Math.sin(x*0.024+t*0.0014)*1.3;
    ctx.lineTo(x, H*0.572+wave);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  const shoreG = ctx.createLinearGradient(0, H*0.568, 0, H*0.578);
  shoreG.addColorStop(0,   'rgba(160,70,70,0)');
  shoreG.addColorStop(0.5, 'rgba(140,55,55,0.3)');
  shoreG.addColorStop(1,   'rgba(60,10,15,0)');
  ctx.fillStyle = shoreG;
  ctx.fill();
  ctx.restore();

  // RAIN
  ctx.save();
  ctx.translate(px*0.65, 0);
  drops.forEach(d => {
    d.y += d.speed;
    if (d.y > 1) { d.y = -0.05; d.x = Math.random(); }
    const x = d.x*W, y = d.y*H;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.sin(0.12)*d.len, y + Math.cos(0.12)*d.len);
    ctx.strokeStyle = `rgba(175,28,38,${d.opacity})`;
    ctx.lineWidth = d.width;
    ctx.stroke();
  });
  ctx.restore();

  // VIGNETTE
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.18,W/2,H/2,H*0.88);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(8,2,4,0.52)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);

  const botVig = ctx.createLinearGradient(0,H*0.82,0,H);
  botVig.addColorStop(0, 'transparent');
  botVig.addColorStop(1, 'rgba(4,1,2,0.75)');
  ctx.fillStyle = botVig;
  ctx.fillRect(0,H*0.82,W,H*0.18);

  requestAnimationFrame(drawScene);
}

requestAnimationFrame(drawScene);
</script>
</body>
</html>
